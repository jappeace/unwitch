on:
  pull_request:
  push:
    branches:
      - master

permissions:
  actions: write

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Local cache
      uses: actions/cache@v4
      with:
        path: /nix/store
        key: "${{ runner.os }}-nix-cache"
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

    - uses: cachix/cachix-action@v15
      with:
        name: jappie
        signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
    - run: nix-build
    - run: nix-shell --run "echo OK"
    - name: Cancel workflow on failure
      if: failure()
      continue-on-error: true
      run: gh run cancel ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}

  microhs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
    - name: Build with MicroHs
      run: |
        nix-shell -p haskellPackages.MicroHs haskellPackages.cpphs --run "
          export LANG=C.UTF-8
          mhs -XCPP -isrc -c Unwitch.Errors
          mhs -XCPP -isrc -c Unwitch.Constant
          mhs -XCPP -isrc -c Unwitch.Convert.Ratio
          mhs -XCPP -isrc -c Unwitch.Convert.Float
          mhs -XCPP -isrc -c Unwitch.Convert.Double
          mhs -XCPP -isrc -c Unwitch.Convert.Fixed
          mhs -XCPP -isrc -c Unwitch.Convert.Integer
          mhs -XCPP -isrc -c Unwitch.Convert.Natural
          mhs -XCPP -isrc -c Unwitch.Convert.Int
          mhs -XCPP -isrc -c Unwitch.Convert.Int8
          mhs -XCPP -isrc -c Unwitch.Convert.Int16
          mhs -XCPP -isrc -c Unwitch.Convert.Int32
          mhs -XCPP -isrc -c Unwitch.Convert.Int64
          mhs -XCPP -isrc -c Unwitch.Convert.Word
          mhs -XCPP -isrc -c Unwitch.Convert.Word8
          mhs -XCPP -isrc -c Unwitch.Convert.Word16
          mhs -XCPP -isrc -c Unwitch.Convert.Word32
          mhs -XCPP -isrc -c Unwitch.Convert.Word64
          mhs -XCPP -isrc -c Unwitch.Convert.CInt
          mhs -XCPP -isrc -c Unwitch.Convert.Char
          mhs -XCPP -isrc -c Unwitch.Convert.Text
          mhs -XCPP -isrc -c Unwitch.Convert.LazyText
          mhs -XCPP -isrc -c Unwitch.Convert.ByteString
          mhs -XCPP -isrc -c Unwitch.Convert.LazyByteString
          mhs -XCPP -isrc -c Unwitch.Convert.ShortByteString
        "
    - name: Cancel workflow on failure
      if: failure()
      continue-on-error: true
      run: gh run cancel ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}

  cabal:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        ghc:
          - '9.12'
          - '9.10'
          - '9.8'
          - '9.6'
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    - uses: haskell-actions/setup@v2
      with:
        ghc-version: ${{ matrix.ghc }}

    - name: Cabal cache
      uses: actions/cache@v4
      env:
        cache-name: cache-cabal
      with:
        path: ~/.cabal
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('**/cabal.project') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-
    - name: Cabal update
      run: cabal update
    - name: Build using cabal
      run: cabal build all
    - name: Test
      run: cabal test all
    - name: Cancel workflow on failure
      if: failure()
      continue-on-error: true
      run: gh run cancel ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}
